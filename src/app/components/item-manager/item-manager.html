<div style="max-width: 600px; margin: 2rem auto; font-family: sans-serif;">
  <h2>Angular GenAI CRUD Application</h2>

  <!-- FORM SECTION -->
  <div style="border: 1px solid #ccc; padding: 1rem; border-radius: 8px; margin-bottom: 2rem;">
    <h3>{{ editingId() !== null ? 'Edit Item' : 'Add New Item' }}</h3>

    <div style="margin-bottom: 0.8rem;">
      <label>Title: </label>
      <input type="text" [ngModel]="title()" (ngModelChange)="title.set($event)" placeholder="Item Title" style="width: 100%; padding: 0.5rem;" />
    </div>

    <div style="margin-bottom: 0.8rem;">
      <label>Category: </label>
      <input type="text" [ngModel]="category()" (ngModelChange)="category.set($event)" style="width: 100%; padding: 0.5rem;" />
    </div>

    <div style="margin-bottom: 0.8rem;">
      <label>Description: </label>
      <textarea [ngModel]="description()" (ngModelChange)="description.set($event)" rows="3" style="width: 100%; padding: 0.5rem;"></textarea>
      
      <!-- GEN AI BUTTON -->
      <button 
        type="button" 
        (click)="generateDescription()" 
        [disabled]="isAiGenerating() || !title()"
        style="margin-top: 0.5rem; background: #6200ee; color: white; border: none; padding: 0.5rem 1rem; border-radius: 4px; cursor: pointer;">
        {{ isAiGenerating() ? 'Generating with Gemini...' : '✨ Generate Description with AI' }}
      </button>
    </div>

    <button (click)="saveItem()" style="padding: 0.5rem 1.5rem; background: #018786; color: white; border: none; border-radius: 4px; cursor: pointer;">
      {{ editingId() !== null ? 'Update Item' : 'Save Item' }}
    </button>
    
    @if (editingId() !== null) {
      <button (click)="resetForm()" style="margin-left: 0.5rem; padding: 0.5rem 1rem;">Cancel</button>
    }
  </div>

  <!-- READ & DELETE LIST -->
  <h3>Item List</h3>
  @for (item of itemList(); track item.id) {
    <div style="border-bottom: 1px solid #eee; padding: 0.8rem 0; display: flex; justify-content: space-between; align-items: center;">
      <div>
        <strong>{{ item.title }}</strong> <small>({{ item.category }})</small>
        <p style="margin: 0.3rem 0; color: #555;">{{ item.description }}</p>
      </div>
      <div>
        <button (click)="editItem(item)" style="margin-right: 0.5rem;">Edit</button>
        <button (click)="deleteItem(item.id)" style="color: red;">Delete</button>
      </div>
    </div>
  } @empty {
    <p>No items found.</p>
  }
</div>
