<section class="login-shell">
  <div class="login-card shadow-lg">
    <div class="text-center mb-4">
      <div class="brand-badge">UD</div>
      <h1 class="h3 fw-bold mb-2">Welcome back</h1>
      <p class="text-muted">Sign in to access your user dashboard</p>
    </div>

    @if (errorMessage()) {
      <div class="alert alert-danger">{{ errorMessage() }}</div>
    }

    <form [formGroup]="loginForm" (ngSubmit)="submit()" class="d-grid gap-3" novalidate>
      <div>
        <label class="form-label">Email</label>
        <input class="form-control form-control-lg" [class.is-invalid]="emailTouched() && email?.invalid" type="email" formControlName="email" placeholder="you@example.com" (blur)="emailTouched.set(true)" />
        @if (emailTouched() && email?.invalid) {
          <div class="invalid-feedback d-block">{{ emailError }}</div>
        }
        @if (email?.pending) {
          <div class="form-text">Checking availability…</div>
        }
      </div>

      <div>
        <label class="form-label">Password</label>
        <input class="form-control form-control-lg" [class.is-invalid]="passwordTouched() && password?.invalid" type="password" formControlName="password" placeholder="Enter password" (blur)="passwordTouched.set(true)" />
        @if (passwordTouched() && password?.invalid) {
          <div class="invalid-feedback d-block">{{ passwordError }}</div>
        }
      </div>

      <button class="btn btn-primary btn-lg" type="submit" [disabled]="isSubmitting()">
        {{ isSubmitting() ? 'Signing in...' : 'Sign in' }}
      </button>
    </form>
  </div>
</section>
